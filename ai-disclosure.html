<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="app-icon.svg">
  <meta http-equiv="refresh" content="0; url=terms.html">
  <title>FilrAI Terms and Conditions</title>
  <style>
    :root {
      --bg: #050607;
      --bg-accent: #2f3338;
      --text: #f6f8fa;
      --muted: #c3c9cf;
      --brand: #f7f9fb;
      --border: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.09) 0 1px, transparent 1px 90px),
        radial-gradient(1000px circle at 10% -10%, #5f666d 0%, transparent 35%),
        linear-gradient(180deg, var(--bg-accent), var(--bg));
      padding: 1rem;
    }

    .redirect {
      width: min(560px, 100%);
      border-left: 2px solid var(--border);
      padding: 0.5rem 0 0.5rem 1.5rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--brand);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    .brand img {
      width: 2.5rem;
      height: 2.5rem;
      display: block;
    }

    .brand span {
      font-size: 1rem;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    p { color: var(--muted); line-height: 1.7; }
    a { color: var(--brand); font-weight: 700; text-underline-offset: 0.2em; }
  </style>
</head>
<body>
  <main class="redirect">
    <a class="brand" href="index.html">
      <img src="app-icon.svg" alt="" width="40" height="40">
      <span>FilrAI</span>
    </a>

    <h1>Terms and Conditions</h1>
    <p>The AI Disclosure has been combined into FilrAI's Terms and Conditions.</p>
    <p>If you are not redirected automatically, <a href="terms.html">open Terms and Conditions</a>.</p>
  </main>
</body>
</html>
