<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=terms.html">
  <title>FilrAI Terms and Conditions</title>
  <style>
    :root {
      --bg: #050607;
      --bg-accent: #2f3338;
      --card: #101214;
      --text: #f6f8fa;
      --muted: #c3c9cf;
      --brand: #f7f9fb;
      --brand-strong: #8f969e;
      --border: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px circle at 10% -10%, #5f666d 0%, transparent 35%),
        linear-gradient(180deg, var(--bg-accent), var(--bg));
      padding: 1rem;
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.3);
    }

    p { color: var(--muted); line-height: 1.7; }
    a { color: var(--brand); font-weight: 700; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Terms and Conditions</h1>
    <p>The AI Disclosure has been combined into FilrAI's Terms and Conditions.</p>
    <p>If you are not redirected automatically, <a href="terms.html">open Terms and Conditions</a>.</p>
  </main>
</body>
</html>
