<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">FilrAI app icon</title>
  <desc id="desc">A black and silver rounded app icon with a small FILR label.</desc>
  <defs>
    <linearGradient id="shell" x1="18" y1="12" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#c9ced4"/>
      <stop offset="1" stop-color="#646b73"/>
    </linearGradient>
    <linearGradient id="screen" x1="40" y1="32" x2="88" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1114"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="30" fill="#050607"/>
  <rect x="22" y="16" width="84" height="96" rx="18" fill="url(#shell)"/>
  <rect x="34" y="26" width="60" height="76" rx="7" fill="#f6f8fa"/>
  <rect x="42" y="52" width="44" height="28" rx="4" fill="url(#screen)"/>
  <text x="64" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="1.2" fill="#f6f8fa">FILR</text>
  <rect x="42" y="52" width="44" height="28" rx="4" fill="none" stroke="#8f969e" stroke-width="2"/>
  <rect x="22" y="16" width="84" height="96" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="3"/>
</svg>
